<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claude Workflow — Tablet</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red:        #E40521;
    --red-tint:   #fef0f1;
    --red-border: #f0d0d2;
    --grey-icon:  #c8c8c8;
    --grey-line:  #ebebeb;
    --grey-border:#e6e6e6;
    --grey-sub:   #aaaaaa;
    --text:       #111111;
  }

  html, body {
    width: 260px;
    height: 400px;
    overflow: hidden;
    background: transparent;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  .frame {
    width: 260px;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px 18px;
  }

  .steps {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .card {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--grey-border);
    background: #fff;
    opacity: 0;
    transform: translateY(10px);
    min-height: 52px;
    transition:
      opacity      550ms cubic-bezier(0.22, 1, 0.36, 1),
      transform    550ms cubic-bezier(0.22, 1, 0.36, 1),
      border-color 700ms ease,
      box-shadow   1100ms ease;
  }

  .card.visible { opacity: 1; transform: translateY(0); }

  .card.active {
    border-color: var(--red);
    box-shadow:
      0 0 0 3px  rgba(228, 5, 33, 0.06),
      0 0 0 7px  rgba(228, 5, 33, 0.025),
      0 0 14px   rgba(228, 5, 33, 0.035);
  }

  .card.done { border-color: var(--red-border); box-shadow: none; }

  .icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 500ms ease;
  }

  .card.active .icon,
  .card.done  .icon { background: var(--red-tint); }

  .icon svg {
    width: 13px;
    height: 13px;
    fill: none;
    stroke: var(--grey-icon);
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 500ms ease;
  }

  .card.active .icon svg,
  .card.done  .icon svg { stroke: var(--red); }

  .icon svg.claude {
    stroke: none;
    fill: var(--grey-icon);
    transition: fill 500ms ease;
  }

  .card.active .icon svg.claude,
  .card.done  .icon svg.claude { fill: var(--red); stroke: none; }

  .text { flex: 1; min-width: 0; }

  .label {
    font-family: 'Poppins', sans-serif;
    font-size: 7px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--grey-icon);
    margin-bottom: 1px;
    transition: color 500ms ease;
  }

  .card.active .label,
  .card.done  .label { color: var(--red); }

  .title {
    font-family: 'Poppins', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .sub {
    font-size: 8.5px;
    color: var(--grey-sub);
    margin-top: 2px;
    line-height: 1.35;
  }

  .check {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    background: var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    opacity: 0;
    transform: scale(0.3);
    transition:
      opacity   250ms ease,
      transform 320ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .check.visible { opacity: 1; transform: scale(1); }

  .check svg {
    width: 7px;
    height: 7px;
    fill: none;
    stroke: #fff;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .connector {
    width: 4px;
    height: 12px;
    margin: 5px 0;
    background: var(--grey-line);
    position: relative;
    overflow: hidden;
    opacity: 0;
    border-radius: 2px;
    transition: opacity 250ms ease;
  }

  .connector.visible { opacity: 1; }

  .fill {
    position: absolute;
    inset: 0;
    background: var(--red);
    transform: scaleY(0);
    transform-origin: top;
    transition: transform 1200ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  .connector.filled .fill { transform: scaleY(1); }

  .dot {
    position: absolute;
    left: 50%;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 5px rgba(228, 5, 33, 0.6);
    transform: translateX(-50%);
    opacity: 0;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="steps" id="steps"></div>
</div>

<script>
  const STEPS = [
    {
      label: 'Step 01', title: 'Explore &amp; Define',
      sub: 'Define use cases, user flows, and key interactions.',

    },
    {
      label: 'Step 02', title: 'Create Assets',
      sub: 'Design wireframes and prepare UI assets.',
      icon: `<svg viewBox="0 0 24 24"><rect x="2.5" y="2.5" width="19" height="19" rx="2.5"/><line x1="2.5" y1="8.5" x2="21.5" y2="8.5"/><line x1="12" y1="8.5" x2="12" y2="21.5"/><rect x="5" y="12" width="4.5" height="3.5" rx="1"/></svg>`
    },
    {
      label: 'Step 03', title: 'Build with Claude',
      sub: 'Upload design assets, build the design system, and generate the UI.',
      icon: `<svg class="claude" viewBox="0 0 1200 1200"><path d="M 233.959793 800.214905 L 468.644287 668.536987 L 472.590637 657.100647 L 468.644287 650.738403 L 457.208069 650.738403 L 417.986633 648.322144 L 283.892639 644.69812 L 167.597321 639.865845 L 54.926208 633.825623 L 26.577238 627.785339 L 3.3e-05 592.751709 L 2.73832 575.27533 L 26.577238 559.248352 L 60.724873 562.228149 L 136.187973 567.382629 L 249.422867 575.194763 L 331.570496 580.026978 L 453.261841 592.671082 L 472.590637 592.671082 L 475.328857 584.859009 L 468.724915 580.026978 L 463.570557 575.194763 L 346.389313 495.785217 L 219.543671 411.865906 L 153.100723 363.543762 L 117.181267 339.060425 L 99.060455 316.107361 L 91.248367 266.01355 L 123.865784 230.093994 L 167.677887 233.073853 L 178.872513 236.053772 L 223.248367 270.201477 L 318.040283 343.570496 L 441.825592 434.738342 L 459.946411 449.798706 L 467.194672 444.64447 L 468.080597 441.020203 L 459.946411 427.409485 L 392.617493 305.718323 L 320.778564 181.932983 L 288.80542 130.630859 L 280.348999 99.865845 C 277.369171 87.221436 275.194641 76.590698 275.194641 63.624268 L 312.322174 13.20813 L 332.8591 6.604126 L 382.389313 13.20813 L 403.248352 31.328979 L 434.013519 101.71814 L 483.865753 212.537048 L 561.181274 363.221497 L 583.812134 407.919434 L 595.892639 449.315491 L 600.40271 461.959839 L 608.214783 461.959839 L 608.214783 454.711609 L 614.577271 369.825623 L 626.335632 265.61084 L 637.771851 131.516846 L 641.718201 93.745117 L 660.402832 48.483276 L 697.530334 24.000122 L 726.52356 37.852417 L 750.362549 72 L 747.060486 94.067139 L 732.886047 186.201416 L 705.100708 330.52356 L 686.979919 427.167847 L 697.530334 427.167847 L 709.61084 415.087341 L 758.496704 350.174561 L 840.644348 247.490051 L 876.885925 206.738342 L 919.167847 161.71814 L 946.308838 140.29541 L 997.61084 140.29541 L 1035.38269 196.429626 L 1018.469849 254.416199 L 965.637634 321.422852 L 921.825562 378.201538 L 859.006714 462.765259 L 819.785278 530.41626 L 823.409424 535.812073 L 832.75177 534.92627 L 974.657776 504.724915 L 1051.328979 490.872559 L 1142.818848 475.167786 L 1184.214844 494.496582 L 1188.724854 514.147644 L 1172.456421 554.335693 L 1074.604126 578.496765 L 959.838989 601.449829 L 788.939636 641.879272 L 786.845764 643.409485 L 789.261841 646.389343 L 866.255127 653.637634 L 899.194702 655.409424 L 979.812134 655.409424 L 1129.932861 666.604187 L 1169.154419 692.537109 L 1192.671265 724.268677 L 1188.724854 748.429688 L 1128.322144 779.194641 L 1046.818848 759.865845 L 856.590759 714.604126 L 791.355774 698.335754 L 782.335693 698.335754 L 782.335693 703.731567 L 836.69812 756.885986 L 936.322205 846.845581 L 1061.073975 962.81897 L 1067.436279 991.490112 L 1051.409424 1014.120911 L 1034.496704 1011.704712 L 924.885986 929.234924 L 882.604126 892.107544 L 786.845764 811.48999 L 780.483276 811.48999 L 780.483276 819.946289 L 802.550415 852.241699 L 919.087341 1027.409424 L 925.127625 1081.127686 L 916.671204 1098.604126 L 886.469849 1109.154419 L 853.288696 1103.114136 L 785.073914 1007.355835 L 714.684631 899.516785 L 657.906067 802.872498 L 650.979858 806.81897 L 617.476624 1167.704834 L 601.771851 1186.147705 L 565.530212 1200 L 535.328857 1177.046997 L 519.302124 1139.919556 L 535.328857 1066.550537 L 554.657776 970.792053 L 570.362488 894.68457 L 584.536926 800.134277 L 592.993347 768.724976 L 592.429626 766.630859 L 585.503479 767.516968 L 514.22821 865.369263 L 405.825531 1011.865906 L 320.053711 1103.677979 L 299.516815 1111.812256 L 263.919525 1093.369263 L 267.221497 1060.429688 L 287.114136 1031.114136 L 405.825531 880.107361 L 477.422913 786.52356 L 523.651062 732.483276 L 523.328918 724.671265 L 520.590698 724.671265 L 205.288605 929.395935 L 149.154434 936.644409 L 124.993355 914.01355 L 127.973183 876.885986 L 139.409409 864.80542 L 234.201385 799.570435 Z"/></svg>`
    },
    {
      label: 'Step 04', title: 'Refine &amp; Systemize',
      sub: 'Refine prompts and polish the UI.',
      icon: `<svg viewBox="0 0 24 24"><rect x="2.5" y="2.5" width="10" height="10" rx="2"/><rect x="15" y="2.5" width="6.5" height="6.5" rx="1.5"/><rect x="15" y="11.5" width="6.5" height="6.5" rx="1.5"/><rect x="2.5" y="15" width="10" height="3.5" rx="1.5"/></svg>`
    }
  ];

  const T = { activate:700, tick:1900, done:2200, connector:2500, nextCard:4000, endPause:2600, fadeOut:600 };

  const container = document.getElementById('steps');
  const cards=[], checks=[], connectors=[];

  STEPS.forEach((step, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="icon">${step.icon}</div><div class="text"><div class="label">${step.label}</div><div class="title">${step.title}</div><div class="sub">${step.sub}</div></div><div class="check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>`;
    container.appendChild(card);
    cards.push(card);
    checks.push(card.querySelector('.check'));
    if (i < STEPS.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'connector';
      conn.innerHTML = '<div class="fill"></div><div class="dot"></div>';
      container.appendChild(conn);
      connectors.push(conn);
    }
  });

  let timers = [];
  const after = (ms, fn) => timers.push(setTimeout(fn, ms));
  const clearAll = () => { timers.forEach(clearTimeout); timers = []; };

  function reset() {
    const frame = document.querySelector('.frame');
    frame.style.transition = 'none'; frame.style.opacity = '1';
    cards.forEach(c => { c.style.transition='none'; c.className='card'; });
    checks.forEach(c => { c.style.transition='none'; c.className='check'; });
    connectors.forEach(conn => {
      conn.style.transition='none'; conn.className='connector';
      const dot = conn.querySelector('.dot');
      dot.style.cssText = 'top:-5px;opacity:0;transition:none;';
    });
  }

  function animateCard(i) {
    const base = i * T.nextCard;
    after(base, () => { cards[i].style.transition=''; cards[i].classList.add('visible'); });
    after(base + T.activate, () => cards[i].classList.add('active'));
    after(base + T.tick, () => { checks[i].style.transition=''; checks[i].classList.add('visible'); });
    after(base + T.done, () => { cards[i].classList.remove('active'); cards[i].classList.add('done'); });
    const conn = connectors[i];
    if (conn) {
      after(base + T.connector, () => {
        conn.classList.add('visible');
        requestAnimationFrame(() => {
          const dot = conn.querySelector('.dot');
          dot.style.top='-5px'; dot.style.opacity='1';
          dot.style.transition='top 1200ms cubic-bezier(0.4,0,0.2,1),opacity 150ms ease';
          requestAnimationFrame(() => {
            conn.classList.add('filled');
            dot.style.top='calc(100% + 3px)';
            setTimeout(() => { dot.style.opacity='0'; }, 1100);
          });
        });
      });
    }
  }

  function run() {
    reset();
    requestAnimationFrame(() => requestAnimationFrame(() => {
      STEPS.forEach((_, i) => animateCard(i));
      const loopAt = (STEPS.length-1)*T.nextCard + T.tick + T.endPause;
      after(loopAt, () => {
        const frame = document.querySelector('.frame');
        frame.style.transition = `opacity ${T.fadeOut}ms ease`;
        frame.style.opacity = '0';
        after(T.fadeOut+60, () => { clearAll(); run(); });
      });
    }));
  }

  run();
</script>
</body>
</html>
